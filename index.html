<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Student Form</h1>
    <form>
        <table>
    <tr>
        <td>
            Name
        </td>
        <td>
            <input type="text" id="name">
        </td>
    </tr>
    <tr>
     <td>
        Age
     </td>
     <td>
        <input type="number" id="age">
     </td>
    </tr>
    <tr>
        <td>
            Gender
        </td>
        <td>
            <input type="radio" id="ae" name="gender">Male
            <input type="radio" id="io" name="gender">Female
        </td>
    </tr>
    <tr>
        <td>
            Course
        </td>
        <td>
            <select id="course">
                <option value="Web">Web</option>
                <option value="Devops">Devops</option>
                <option value="Java">Java</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>
            Email
        </td>
        <td>
            <input type="email" id="mail">
        </td>
    </tr>
    <tr>
        <td>
            <button id="saveBtn" type="button" onclick="save()">Save</button>
        </td>
    </tr>
        </table>
    </form>

    <table id="details">
    <tr>
        <th>
            Name
        </th>
        <th>
            Age
        </th>
        <th>
            Gender
        </th>
        <th>
            Course
        </th>
        <th>
            Email
        </th>
        <th>
            Action
        </th>
    </tr>
    </table>
    <script>
        var table=document.getElementById("details")
        function save(){
        var row=document.createElement("tr")
        var td1=document.createElement("td")
        var name=document.getElementById("name")
        td1.textContent=name.value
        row.append(td1)
        var td2=document.createElement("td")
        var age=document.getElementById("age")
        td2.textContent=age.value
        row.append(td2)
        var td3=document.createElement("td")
        var male=document.getElementById("ae")
        var female=document.getElementById("io")
        var gender
        if(male.checked){
            gender="male"
        }
        else{
            gender="female"
        }
        td3.textContent=gender
        row.append(td3)
        var td4=document.createElement("td")
        var course=document.getElementById("course")
        td4.textContent=course.value
        row.append(td4)
        var td5=document.createElement("td")
        var email=document.getElementById("mail")
        td5.textContent=email.value
        row.append(td5)
        var td6=document.createElement("td")
        var button=document.createElement("button")
        button.textContent="Delete"
        button.id="deleteBtn"
        button.onclick=deleteItem
        td6.append(button)
        row.append(td6)
        table.append(row)
    }

    function deleteItem(event){
        event.target.parentElement.parentElement.remove()
    }
    </script>
</body>
</html>
