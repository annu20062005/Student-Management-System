<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Student Form</h1>
    <form>
        <table>
    <tr>
        <td>
            Name
        </td>
        <td>
            <input type="text" id="name">
        </td>
    </tr>
    <tr>
     <td>
        Age
     </td>
     <td>
        <input type="number" id="age">
     </td>
    </tr>
    <tr>
        <td>
            Gender
        </td>
        <td>
            <input type="radio" id="ae" name="gender">Male
            <input type="radio" id="io" name="gender">Female
        </td>
    </tr>
    <tr>
        <td>
            Course
        </td>
        <td>
            <select id="course">
                <option value="Web">Web</option>
                <option value="Devops">Devops</option>
                <option value="Java">Java</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>
            Email
        </td>
        <td>
            <input type="email" id="mail">
        </td>
    </tr>
    <tr>
        <td>
            <button id="saveBtn" type="button" onclick="save()">Save</button>
        </td>
    </tr>
        </table>
    </form>

    <table id="details">
    <tr>
        <th>
            Name
        </th>
        <th>
            Age
        </th>
        <th>
            Gender
        </th>
        <th>
            Course
        </th>
        <th>
            Email
        </th>
        <th>
            Action
        </th>
    </tr>
    </table>
    <script src="script.js"> 
    </script>
</body>
</html>
